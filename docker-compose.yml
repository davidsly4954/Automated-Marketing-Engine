services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.7.4
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_SECURE_COOKIE=false
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BUFFER_ACCESS_TOKEN=${BUFFER_ACCESS_TOKEN:-}
      - BUFFER_LINKEDIN_PROFILE_ID=${BUFFER_LINKEDIN_PROFILE_ID:-}
      - TYPEFULLY_API_KEY=${TYPEFULLY_API_KEY:-}
      - TYPEFULLY_SOCIAL_SET_ID=${TYPEFULLY_SOCIAL_SET_ID:-}
      - LOOPS_API_KEY=${LOOPS_API_KEY:-}
      - LOOPS_NEWSLETTER_TEMPLATE_ID=${LOOPS_NEWSLETTER_TEMPLATE_ID:-}
      - DEVTO_API_KEY=${DEVTO_API_KEY:-}
      - HASHNODE_PAT=${HASHNODE_PAT:-}
      - HASHNODE_PUBLICATION_ID=${HASHNODE_PUBLICATION_ID:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/local_files:/files
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
